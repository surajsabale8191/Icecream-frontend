{% extends "base.html" %}
{% load static %}

{% block title %}
Change Password
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-header text-center">
                <h3>Change Password 🔒</h3>
            </div>

            <div class="card-body">

                <form id="passwordForm">

                    <div class="mb-3">
                        <label>Old Password</label>
                        <input
                            type="password"
                            id="old_password"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label>New Password</label>
                        <input
                            type="password"
                            id="new_password"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label>Confirm Password</label>
                        <input
                            type="password"
                            id="confirm_password"
                            class="form-control"
                            required>
                    </div>

                    <button
                        class="btn btn-warning w-100"
                        type="submit">
                        Change Password
                    </button>

                </form>

                <div id="message" class="mt-3"></div>

            </div>

        </div>

    </div>

</div>

<script src="{% static 'js/change_password.js' %}"></script>

{% endblock %}
