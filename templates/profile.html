{% extends "base.html" %}
{% load static %}

{% block title %}
Profile
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header text-center">
                    <h3>My Profile 👤</h3>
                </div>

                <div class="card-body">

                    <table class="table">

                        <tr>
                            <th>First Name</th>
                            <td id="first_name">Loading...</td>
                        </tr>

                        <tr>
                            <th>Last Name</th>
                            <td id="last_name">Loading...</td>
                        </tr>

                        <tr>
                            <th>Username</th>
                            <td id="username">Loading...</td>
                        </tr>

                        <tr>
                            <th>Email</th>
                            <td id="email">Loading...</td>
                        </tr>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="{% static 'js/profile.js' %}"></script>

{% endblock %}
