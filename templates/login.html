{% extends "base.html" %}
{% load static %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-header text-center">
                    <h3>Login 🍦</h3>
                </div>

                <div class="card-body">

                    <form id="loginForm">

                        <div class="mb-3">
                            <label>Username</label>
                            <input
                                type="text"
                                class="form-control"
                                id="username"
                                required>
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                required>
                        </div>

                        <button
                            type="submit"
                            class="btn btn-warning w-100">

                            Login

                        </button>

                    </form>

                    <div id="message" class="mt-3"></div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="{% static 'js/login.js' %}"></script>

{% endblock %}
